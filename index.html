<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notebook</title>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', 'JetBrains Mono', monospace;
      background: var(--bg-app);
      color: var(--fg-1);
      min-height: 100vh;
    }
    .app { max-width: 720px; margin: 0 auto; padding: 24px 16px; }
    header { text-align: center; margin-bottom: 20px; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .header-top h1 { font-family: 'JetBrains Mono', monospace; font-size: 14px; letter-spacing: 2px; color: var(--fg-3); margin-bottom: 0; }
    .header-top button { background: transparent; border: none; color: var(--fg-2); cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
    header div { font-size: 13px; color: var(--lori-blue); margin-bottom: 2px; }
    header div:last-child { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--fg-3); letter-spacing: 1px; }
    .error-banner {
      background: var(--err-bg);
      color: var(--err-fg);
      border: 1px solid var(--err-border);
      padding: 10px 14px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
      cursor: pointer;
    }
    .filters { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .filters button {
      background: var(--surface-3);
      border: 1px solid var(--border-low);
      color: var(--fg-2);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.5px;
    }
    .filters button.active {
      color: var(--fg-1);
      border-color: var(--border-high);
      background: rgba(255, 255, 255, 0.08);
    }
    .date-filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .date-filters button {
      background: rgba(20, 22, 28, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--fg-2);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.5px;
    }
    .date-filters button.active { color: var(--fg-1); border-color: var(--border-high); }
    .search-box {
      width: 100%;
      background: var(--surface-input);
      border: 1px solid var(--border-mid);
      color: var(--fg-1);
      font-family: 'Noto Sans SC', 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 16px;
      outline: none;
    }
    .new-entry {
      border: 1px solid var(--border-low);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 16px;
      background: var(--surface-1);
    }
    .new-entry textarea {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--fg-1);
      font-family: 'JetBrains Mono', 'Noto Sans SC', monospace;
      font-size: 13px;
      resize: vertical;
      min-height: 60px;
      outline: none;
    }
    .new-entry-actions { display: flex; justify-content: space-between; margin-top: 8px; }
    .new-entry-actions button {
      background: var(--surface-4);
      border: 1px solid var(--border-mid);
      color: var(--fg-3);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }
    .new-entry-actions button:last-child { color: var(--maomao-pink); }
    .loading { text-align: center; padding: 40px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--fg-3); letter-spacing: 1px; }
    .empty { text-align: center; padding: 40px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--fg-3); letter-spacing: 1px; }
    .entry-card {
      border: 1px solid var(--border-low);
      border-radius: 6px;
      padding: 14px;
      margin-bottom: 12px;
      background: var(--surface-1);
    }
    .entry-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 11px; font-family: 'JetBrains Mono', monospace; }
    .entry-author-ai { color: var(--lori-blue); }
    .entry-author-user { color: var(--maomao-pink); }
    .entry-meta { color: var(--fg-3); margin-left: auto; }
    .entry-actions { display: flex; gap: 6px; }
    .entry-actions button {
      background: transparent;
      border: none;
      color: var(--fg-3);
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 4px 8px;
    }
    .entry-actions button:hover { color: var(--fg-1); }
    .edit-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 8px; }
    .edit-actions button {
      background: var(--surface-4);
      border: 1px solid var(--border-mid);
      color: var(--fg-2);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }
    .edit-actions button.primary { color: var(--maomao-pink); }
    .entry-content { font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .entry-card textarea {
      width: 100%;
      background: var(--surface-input);
      border: 1px solid var(--border-mid);
      color: var(--fg-1);
      font-family: 'JetBrains Mono', 'Noto Sans SC', monospace;
      font-size: 13px;
      border-radius: 4px;
      padding: 8px;
      min-height: 60px;
      resize: vertical;
      outline: none;
      margin-bottom: 8px;
    }
    .annotation-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-faint); }
    .annotation-toggle {
      background: transparent;
      border: none;
      color: var(--fg-3);
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.5px;
      padding: 0;
    }
    .annotation-list { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
    .annotation-bubble {
      background: var(--surface-2);
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .annotation-author-ai { color: var(--lori-blue); }
    .annotation-author-user { color: var(--maomao-pink); }
    .annotation-content { color: var(--fg-1); line-height: 1.5; }
    .annotation-time { font-size: 10px; color: var(--fg-3); }
    .annotation-input-row { display: flex; gap: 8px; margin-top: 8px; }
    .annotation-input-row input {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border-mid);
      color: var(--fg-1);
      font-family: 'JetBrains Mono', 'Noto Sans SC', monospace;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 4px;
      outline: none;
    }
    .annotation-input-row button {
      background: var(--surface-4);
      border: 1px solid var(--border-mid);
      color: var(--fg-3);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }
    .annotation-input-row button.primary { color: var(--maomao-pink); }
    footer { text-align: center; padding: 24px 0; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--fg-3); letter-spacing: 1px; }
    .connect-page { max-width: 400px; margin: 80px auto; padding: 24px; text-align: center; }
    .connect-page h1 { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--fg-3); letter-spacing: 2px; margin-bottom: 24px; }
    .connect-page input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border-mid);
      color: var(--fg-1);
      padding: 10px 12px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      outline: none;
    }
    .connect-page button {
      width: 100%;
      background: var(--lori-blue-bg);
      border: 1px solid var(--lori-blue-border);
      color: var(--lori-blue);
      padding: 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
    }
    .connect-page .hint {
      font-size: 11px;
      color: var(--fg-3);
      text-align: left;
      margin-top: -8px;
      margin-bottom: 12px;
    }
    .lang-toggle { display: inline-flex; align-items: center; gap: 4px; }
    .lang-toggle button {
      background: transparent; border: none;
      color: var(--fg-3);
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 2px 4px;
    }
    .lang-toggle button.active { color: var(--fg-1); }
    .lang-divider { color: var(--fg-3); font-size: 11px; }
    @media (max-width: 600px) {
      .entry-actions button { padding: 6px 10px; font-size: 12px; }
      .filters button { padding: 8px 14px; }
      .date-filters button { padding: 8px 14px; }
      .edit-actions button,
      .annotation-input-row button,
      .new-entry-actions button { padding: 8px 14px; }
      .new-entry textarea,
      .entry-card textarea,
      .annotation-input-row input,
      .connect-page input,
      .search-box { font-size: 16px; }
    }
  </style>
</head>
<body class="ds-app">
  <div class="ds-seed-field" aria-hidden="true"></div>
  <div id="root">
    <div style="text-align: center; padding: 80px 20px; color: #4a5568;
                font-family: 'JetBrains Mono', monospace; font-size: 11px;
                letter-spacing: 2px;">
      ── BOOT SEQUENCE ──<br><br>
      LOADING MEMORY BUFFER...
    </div>
  </div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const STRINGS = {
      zh: {
        all: '全部', today: '本日', '3d': '近三日', '7d': '近七日', '30d': '近三十日',
        save: '保存', cancel: '取消', edit: '编辑', delete: '删除',
        pin: '置顶', unpin: '取消置顶', connect: '连接',
        writePlaceholder: '写点什么...',
        annotationPlaceholder: '写批注...',
        searchPlaceholder: '搜索内容...',
        loading: '加载中...', empty: '暂无条目',
        annotationsCount: n => `${n} 条批注`,
        deleteConfirm: '删除这条条目？',
        refreshTooltip: '刷新', exportTooltip: '导出',
        connectionFailed: '连接失败：',
        tokenLabel: 'API Token (可选)',
        urlHint: '只需 Supabase 项目 URL，会自动拼接 Edge Function 路径',
        exportTitle: 'Notebook 导出',
        exportAnnotations: '**批注：**',
      },
      en: {
        all: 'All', today: 'Today', '3d': '3 days', '7d': '7 days', '30d': '30 days',
        save: 'Save', cancel: 'Cancel', edit: 'Edit', delete: 'Delete',
        pin: 'Pin', unpin: 'Unpin', connect: 'Connect',
        writePlaceholder: 'Write something...',
        annotationPlaceholder: 'Add annotation...',
        searchPlaceholder: 'Search...',
        loading: 'Loading...', empty: 'No entries',
        annotationsCount: n => `${n} annotation${n === 1 ? '' : 's'}`,
        deleteConfirm: 'Delete this entry?',
        refreshTooltip: 'Refresh', exportTooltip: 'Export',
        connectionFailed: 'Connection failed: ',
        tokenLabel: 'API Token (optional)',
        urlHint: 'Project URL only — Edge Function path is auto-appended',
        exportTitle: 'Notebook Export',
        exportAnnotations: '**Annotations:**',
      }
    };

    const VALID_LANGS = ['zh', 'en'];

    function getCredentials() {
      const hash = window.location.hash.slice(1);
      const [url, token] = hash.split('|');
      return [url, token || ''];
    }

    async function api(path, options = {}) {
      const [baseUrl, token] = getCredentials();
      if (!baseUrl) throw new Error('Not connected');
      const headers = {
        'Content-Type': 'application/json',
        ...(token ? { 'X-Notebook-Token': token } : {})
      };
      const res = await fetch(baseUrl + path, { ...options, headers });
      if (res.status === 401) throw new Error('Unauthorized');
      if (res.status === 403) throw new Error('Forbidden');
      if (res.status === 400) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || 'Bad request');
      }
      if (!res.ok) throw new Error('Request failed');
      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }

    const VALID_DATE_FILTERS = ['all', 'today', '3d', '7d', '30d'];

    function sortEntries(arr) {
      return [...arr].sort((a, b) => {
        if (a.pinned !== b.pinned) return b.pinned - a.pinned;
        return new Date(b.created_at) - new Date(a.created_at);
      });
    }

    function dateFilterPass(entry, filter) {
      if (filter === 'all') return true;
      const days = { today: 1, '3d': 3, '7d': 7, '30d': 30 }[filter];
      const cutoff = new Date();
      cutoff.setHours(0, 0, 0, 0);
      cutoff.setDate(cutoff.getDate() - (days - 1));
      return new Date(entry.created_at) >= cutoff;
    }

    function App() {
      const [hash, setHash] = useState(window.location.hash.slice(1));
      const [entries, setEntries] = useState([]);
      const [settings, setSettings] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [filter, setFilter] = useState('all');
      const [dateFilter, setDateFilter] = useState(() => {
        try {
          const stored = localStorage.getItem('notebook.dateFilter');
          return VALID_DATE_FILTERS.includes(stored) ? stored : 'all';
        } catch { return 'all'; }
      });
      const [lang, setLang] = useState(() => {
        try {
          const stored = localStorage.getItem('notebook.lang');
          return VALID_LANGS.includes(stored) ? stored : 'zh';
        } catch { return 'zh'; }
      });
      const [searchQuery, setSearchQuery] = useState('');
      const [newContent, setNewContent] = useState('');
      const [newPinned, setNewPinned] = useState(false);
      const [urlInput, setUrlInput] = useState('');
      const [tokenInput, setTokenInput] = useState('');
      const t = STRINGS[lang];

      useEffect(() => {
        if (hash) loadAll();
      }, [hash]);

      useEffect(() => {
        try { localStorage.setItem('notebook.dateFilter', dateFilter); } catch {}
      }, [dateFilter]);

      useEffect(() => {
        try { localStorage.setItem('notebook.lang', lang); } catch {}
      }, [lang]);

      async function loadAll() {
        setLoading(true);
        setError(null);
        try {
          const [entriesData, settingsData] = await Promise.all([
            api('/entries'),
            api('/settings')
          ]);
          setEntries(entriesData || []);
          setSettings(settingsData);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }

      async function saveEntry() {
        if (!newContent.trim()) return;
        try {
          const newEntry = await api('/entries', {
            method: 'POST',
            body: JSON.stringify({ content: newContent, pinned: newPinned })
          });
          setNewContent('');
          setNewPinned(false);
          setEntries(prev => sortEntries([{ ...newEntry, annotation_count: 0 }, ...prev]));
        } catch (e) {
          setError(e.message);
        }
      }

      async function deleteEntry(id) {
        try {
          await api(`/entries/${id}`, { method: 'DELETE' });
          setEntries(prev => prev.filter(e => e.id !== id));
        } catch (e) {
          setError(e.message);
        }
      }

      async function patchEntry(id, body) {
        try {
          const updated = await api(`/entries/${id}`, {
            method: 'PATCH',
            body: JSON.stringify(body)
          });
          setEntries(prev => sortEntries(prev.map(e => {
            if (e.id !== id) return e;
            return { ...updated, annotation_count: e.annotation_count };
          })));
        } catch (e) {
          setError(e.message);
          throw e;
        }
      }

      async function addAnnotation(id, content) {
        try {
          const newAnnotation = await api(`/entries/${id}/annotations`, {
            method: 'POST',
            body: JSON.stringify({ content })
          });
          setEntries(prev => prev.map(e =>
            e.id === id
              ? { ...e, annotation_count: (e.annotation_count || 0) + 1 }
              : e
          ));
          return newAnnotation;
        } catch (e) {
          setError(e.message);
          throw e;
        }
      }

      async function connect() {
        const base = urlInput.replace(/\/$/, '');
        const fullUrl = base.endsWith('/notebook-api') ? base : `${base}/functions/v1/notebook-api`;
        try {
          const headers = tokenInput ? { 'X-Notebook-Token': tokenInput } : {};
          const res = await fetch(`${fullUrl}/entries`, { headers });
          if (!res.ok) throw new Error('Check URL and token');
          const hashValue = `${fullUrl}|${tokenInput}`;
          window.location.hash = hashValue;
          setHash(hashValue);
        } catch (e) {
          setError(t.connectionFailed + e.message);
        }
      }

      async function exportMarkdown() {
        try {
          const fullEntries = await api('/entries?include=annotations');
          const md = generateMarkdown(fullEntries, settings, t);
          const filename = `notebook-${new Date().toISOString().slice(0, 10)}.md`;
          downloadFile(filename, md, 'text/markdown');
        } catch (e) { setError(e.message); }
      }

      function generateMarkdown(entries, settings, t) {
        const lines = [`# ${t.exportTitle} · ${new Date().toLocaleDateString()}`, ''];
        for (const e of entries) {
          const author = e.author === 'ai' ? (settings?.ai_name || 'AI') : (settings?.user_name || 'User');
          const date = new Date(e.created_at).toLocaleString();
          const pin = e.pinned ? ' · 📌' : '';
          lines.push(`## #${e.id} · ${author}${pin} · ${date}`, '', e.content, '');
          if (e.annotations?.length) {
            lines.push(t.exportAnnotations, '');
            for (const a of e.annotations) {
              const aAuthor = a.author === 'ai' ? (settings?.ai_name || 'AI') : (settings?.user_name || 'User');
              const aDate = new Date(a.created_at).toLocaleString();
              lines.push(`- **${aAuthor}** (${aDate}): ${a.content}`);
            }
            lines.push('');
          }
          lines.push('---', '');
        }
        return lines.join('\n');
      }

      function downloadFile(filename, content, mime) {
        const blob = new Blob([content], { type: `${mime};charset=utf-8` });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename; a.click();
        URL.revokeObjectURL(url);
      }

      const filtered = entries.filter(e => {
        let pass = true;
        if (filter === 'pinned') pass = e.pinned;
        else if (filter === 'ai') pass = e.author === 'ai';
        else if (filter === 'user') pass = e.author === 'user';
        if (pass) pass = dateFilterPass(e, dateFilter);
        if (pass && searchQuery.trim()) {
          const q = searchQuery.toLowerCase();
          pass = e.content.toLowerCase().includes(q);
        }
        return pass;
      });

      if (!hash) {
        return (
          <div className="connect-page">
            <h1>NOTEBOOK</h1>
            {error && <div className="error-banner" onClick={() => setError(null)}>{error}</div>}
            <input
              placeholder="https://xxx.supabase.co"
              value={urlInput}
              onChange={e => setUrlInput(e.target.value)}
            />
            <div className="hint">{t.urlHint}</div>
            <input
              placeholder={t.tokenLabel}
              value={tokenInput}
              onChange={e => setTokenInput(e.target.value)}
            />
            <button onClick={connect}>{t.connect}</button>
          </div>
        );
      }

      return (
        <div className="app">
          <header>
            <div className="header-top">
              <h1>NOTEBOOK</h1>
              <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                <div className="lang-toggle">
                  <button className={lang === 'en' ? 'active' : ''} onClick={() => setLang('en')}>EN</button>
                  <span className="lang-divider">|</span>
                  <button className={lang === 'zh' ? 'active' : ''} onClick={() => setLang('zh')}>中文</button>
                </div>
                <button title={t.refreshTooltip} onClick={loadAll}>↻</button>
                <button title={t.exportTooltip} onClick={exportMarkdown} aria-label={t.exportTooltip}>
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor"
                       stroke-width="1" stroke-linecap="round" stroke-linejoin="round"
                       style={{display:'block'}}>
                    <path d="M7 1.5 V10"/>
                    <path d="M3.5 6.5 L7 10 L10.5 6.5"/>
                    <path d="M2 12.5 H12"/>
                  </svg>
                </button>
              </div>
            </div>
            <div>{settings?.ai_name || 'AI'} × {settings?.user_name || 'User'}</div>
            <div>STANDBY MEMORY BUFFER</div>
          </header>

          {error && <div className="error-banner" onClick={() => setError(null)}>{error}</div>}

          <div className="filters">
            <button className={filter === 'all' ? 'active' : ''} onClick={() => setFilter('all')}>{t.all}</button>
            <button className={filter === 'pinned' ? 'active' : ''} onClick={() => setFilter('pinned')}>❋</button>
            <button className={filter === 'ai' ? 'active' : ''} onClick={() => setFilter('ai')}>{settings?.ai_name || 'AI'}</button>
            <button className={filter === 'user' ? 'active' : ''} onClick={() => setFilter('user')}>{settings?.user_name || 'User'}</button>
          </div>

          <div className="date-filters">
            <button className={dateFilter === 'all' ? 'active' : ''} onClick={() => setDateFilter('all')}>{t.all}</button>
            <button className={dateFilter === 'today' ? 'active' : ''} onClick={() => setDateFilter('today')}>{t.today}</button>
            <button className={dateFilter === '3d' ? 'active' : ''} onClick={() => setDateFilter('3d')}>{t['3d']}</button>
            <button className={dateFilter === '7d' ? 'active' : ''} onClick={() => setDateFilter('7d')}>{t['7d']}</button>
            <button className={dateFilter === '30d' ? 'active' : ''} onClick={() => setDateFilter('30d')}>{t['30d']}</button>
          </div>

          <input
            className="search-box"
            value={searchQuery}
            onChange={e => setSearchQuery(e.target.value)}
            placeholder={t.searchPlaceholder}
          />

          <div className="new-entry">
            <textarea
              value={newContent}
              onChange={e => setNewContent(e.target.value)}
              placeholder={t.writePlaceholder}
            />
            <div className="new-entry-actions">
              <button onClick={() => setNewPinned(!newPinned)}>{newPinned ? t.unpin : t.pin}</button>
              <button onClick={saveEntry}>{t.save}</button>
            </div>
          </div>

          {loading && <div className="loading">{t.loading}</div>}

          {!loading && filtered.length === 0 && <div className="empty">{t.empty}</div>}

          {!loading && filtered.map(entry => (
            <EntryCard
              key={entry.id}
              entry={entry}
              settings={settings}
              onDelete={deleteEntry}
              onPatch={patchEntry}
              onAnnotate={addAnnotation}
              t={t}
            />
          ))}

          <footer>NON-ARCHIVABLE</footer>
        </div>
      );
    }

    function EntryCard({ entry, settings, onDelete, onPatch, onAnnotate, t }) {
      const [editing, setEditing] = useState(false);
      const [editContent, setEditContent] = useState(entry.content);

      async function handlePin() {
        await onPatch(entry.id, { pinned: !entry.pinned });
      }

      async function handleDelete() {
        if (!confirm(t.deleteConfirm)) return;
        await onDelete(entry.id);
      }

      async function handleSaveEdit() {
        try {
          await onPatch(entry.id, { content: editContent });
          setEditing(false);
        } catch (e) {
          // 保持 editing 状态，错误已由父组件显示
        }
      }

      const authorName = entry.author === 'ai'
        ? (settings?.ai_name || 'AI')
        : (settings?.user_name || 'User');

      return (
        <div className="entry-card" style={entry.pinned ? { background: 'var(--surface-pinned)' } : {}}>
          <div className="entry-header">
            <span className={entry.author === 'ai' ? 'entry-author-ai' : 'entry-author-user'}>[{authorName}]</span>
            {entry.pinned && <span>❋</span>}
            <span className="entry-meta">#{entry.id} {new Date(entry.created_at).toLocaleDateString()}</span>
            {entry.author === 'user' && (
              <span className="entry-actions">
                {!editing && <button onClick={() => { setEditing(true); setEditContent(entry.content); }}>{t.edit}</button>}
                <button onClick={handleDelete}>{t.delete}</button>
                <button onClick={handlePin}>{entry.pinned ? t.unpin : t.pin}</button>
              </span>
            )}
          </div>
          {editing ? (
            <div>
              <textarea value={editContent} onChange={e => setEditContent(e.target.value)} />
              <div className="edit-actions">
                <button className="primary" onClick={handleSaveEdit}>{t.save}</button>
                <button onClick={() => setEditing(false)}>{t.cancel}</button>
              </div>
            </div>
          ) : (
            <div className="entry-content">{entry.content}</div>
          )}
          <NoteSection entry={entry} settings={settings} onAnnotate={onAnnotate} t={t} />
        </div>
      );
    }

    function NoteSection({ entry, settings, onAnnotate, t }) {
      const [expanded, setExpanded] = useState(false);
      const [annotations, setAnnotations] = useState([]);
      const [input, setInput] = useState('');

      async function toggle() {
        const next = !expanded;
        if (next && annotations.length < entry.annotation_count) {
          try {
            const detail = await api(`/entries/${entry.id}`);
            setAnnotations(detail.annotations || []);
          } catch (e) {
            // ignore
          }
        }
        setExpanded(next);
      }

      async function submit() {
        if (!input.trim()) return;
        try {
          const newAnnotation = await onAnnotate(entry.id, input);
          setInput('');
          setExpanded(true);
          setAnnotations(prev => [...prev, newAnnotation]);
        } catch (e) {
          // 错误已由父组件显示
        }
      }

      return (
        <div className="annotation-section">
          {entry.annotation_count > 0 && (
            <button className="annotation-toggle" onClick={toggle}>
              {t.annotationsCount(entry.annotation_count)}
            </button>
          )}
          {expanded && (
            <div className="annotation-list">
              {annotations.map(a => (
                <div key={a.id} className="annotation-bubble">
                  <span className={`annotation-author annotation-author-${a.author}`}>
                    {a.author === 'ai' ? (settings?.ai_name || 'AI') : (settings?.user_name || 'User')}
                  </span>
                  <span className="annotation-content">{a.content}</span>
                  <span className="annotation-time">{new Date(a.created_at).toLocaleString()}</span>
                </div>
              ))}
              <div className="annotation-input-row">
                <input
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  placeholder={t.annotationPlaceholder}
                  onKeyDown={e => e.key === 'Enter' && submit()}
                />
                <button className="primary" onClick={submit}>{t.save}</button>
              </div>
            </div>
          )}
          {entry.annotation_count === 0 && (
            <div className="annotation-input-row">
              <input
                value={input}
                onChange={e => setInput(e.target.value)}
                placeholder={t.annotationPlaceholder}
                onKeyDown={e => e.key === 'Enter' && submit()}
              />
              <button className="primary" onClick={submit}>{t.save}</button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <style>
    .annotation-author { font-family: 'JetBrains Mono', monospace; font-size: 10px; }
  </style>
</body>
</html>
