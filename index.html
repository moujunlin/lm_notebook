<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notebook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', 'JetBrains Mono', monospace;
      background: linear-gradient(180deg, #0a0b0f 0%, #111318 100%);
      color: #c8cdd8;
      min-height: 100vh;
    }
    .app { max-width: 720px; margin: 0 auto; padding: 24px 16px; }
    header { text-align: center; margin-bottom: 20px; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .header-top h1 { font-family: 'JetBrains Mono', monospace; font-size: 14px; letter-spacing: 2px; color: #4a5568; margin-bottom: 0; }
    .header-top button { background: transparent; border: none; color: #7a8599; cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
    header div { font-size: 13px; color: #6a8fba; margin-bottom: 2px; }
    header div:last-child { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #4a5568; letter-spacing: 1px; }
    .error-banner {
      background: rgba(180, 80, 80, 0.15);
      color: #d88;
      border: 1px solid rgba(180, 80, 80, 0.25);
      padding: 10px 14px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
      cursor: pointer;
    }
    .filters { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .filters button {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: #7a8599;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.5px;
    }
    .filters button.active { color: #c8cdd8; border-color: rgba(255,255,255,0.15); }
    .date-filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .date-filters button {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: #4a5568;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.5px;
    }
    .date-filters button.active { color: #c8cdd8; border-color: rgba(255,255,255,0.15); }
    .new-entry {
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 16px;
      background: rgba(255,255,255,0.02);
    }
    .new-entry textarea {
      width: 100%;
      background: transparent;
      border: none;
      color: #c8cdd8;
      font-family: 'JetBrains Mono', 'Noto Sans SC', monospace;
      font-size: 13px;
      resize: vertical;
      min-height: 60px;
      outline: none;
    }
    .new-entry-actions { display: flex; justify-content: space-between; margin-top: 8px; }
    .new-entry-actions button {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #4a5568;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }
    .new-entry-actions button:last-child { color: #b89a6a; }
    .loading { text-align: center; padding: 40px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #4a5568; letter-spacing: 1px; }
    .empty { text-align: center; padding: 40px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #4a5568; letter-spacing: 1px; }
    .entry-card {
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      padding: 14px;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.02);
    }
    .entry-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 11px; font-family: 'JetBrains Mono', monospace; }
    .entry-author-ai { color: #6a8fba; }
    .entry-author-user { color: #b89a6a; }
    .entry-meta { color: #4a5568; margin-left: auto; }
    .entry-actions { display: flex; gap: 6px; }
    .entry-actions button {
      background: transparent;
      border: none;
      color: #4a5568;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 2px 4px;
    }
    .entry-actions button:hover { color: #c8cdd8; }
    .edit-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 8px; }
    .edit-actions button {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #7a8599;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }
    .edit-actions button.primary { color: #b89a6a; }
    .entry-content { font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .entry-card textarea {
      width: 100%;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.08);
      color: #c8cdd8;
      font-family: 'JetBrains Mono', 'Noto Sans SC', monospace;
      font-size: 13px;
      border-radius: 4px;
      padding: 8px;
      min-height: 60px;
      resize: vertical;
      outline: none;
      margin-bottom: 8px;
    }
    .annotation-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.04); }
    .annotation-toggle {
      background: transparent;
      border: none;
      color: #4a5568;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.5px;
      padding: 0;
    }
    .annotation-list { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
    .annotation-bubble {
      background: rgba(255,255,255,0.03);
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .annotation-author { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #6a8fba; }
    .annotation-content { color: #c8cdd8; line-height: 1.5; }
    .annotation-time { font-size: 10px; color: #4a5568; }
    .annotation-input-row { display: flex; gap: 8px; margin-top: 8px; }
    .annotation-input-row input {
      flex: 1;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.08);
      color: #c8cdd8;
      font-family: 'JetBrains Mono', 'Noto Sans SC', monospace;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 4px;
      outline: none;
    }
    .annotation-input-row button {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #4a5568;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }
    .annotation-input-row button.primary { color: #b89a6a; }
    footer { text-align: center; padding: 24px 0; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #4a5568; letter-spacing: 1px; }
    .connect-page { max-width: 400px; margin: 80px auto; padding: 24px; text-align: center; }
    .connect-page h1 { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #4a5568; letter-spacing: 2px; margin-bottom: 24px; }
    .connect-page input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      color: #c8cdd8;
      padding: 10px 12px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      outline: none;
    }
    .connect-page button {
      width: 100%;
      background: rgba(106, 143, 186, 0.15);
      border: 1px solid rgba(106, 143, 186, 0.25);
      color: #6a8fba;
      padding: 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function getCredentials() {
      const hash = window.location.hash.slice(1);
      const [url, token] = hash.split('|');
      return [url, token];
    }

    async function api(path, options = {}) {
      const [baseUrl, token] = getCredentials();
      if (!baseUrl || !token) throw new Error('Not connected');
      const headers = {
        'Content-Type': 'application/json',
        'X-Notebook-Token': token
      };
      const res = await fetch(baseUrl + path, { ...options, headers });
      if (res.status === 401) throw new Error('Unauthorized');
      if (res.status === 403) throw new Error('Forbidden');
      if (res.status === 400) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || 'Bad request');
      }
      if (!res.ok) throw new Error('Request failed');
      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }

    const VALID_DATE_FILTERS = ['all', 'today', '3d', '7d', '30d'];

    function sortEntries(arr) {
      return [...arr].sort((a, b) => {
        if (a.pinned !== b.pinned) return b.pinned - a.pinned;
        return new Date(b.created_at) - new Date(a.created_at);
      });
    }

    function dateFilterPass(entry, filter) {
      if (filter === 'all') return true;
      const days = { today: 1, '3d': 3, '7d': 7, '30d': 30 }[filter];
      const cutoff = new Date();
      cutoff.setHours(0, 0, 0, 0);
      cutoff.setDate(cutoff.getDate() - (days - 1));
      return new Date(entry.created_at) >= cutoff;
    }

    function App() {
      const [hash, setHash] = useState(window.location.hash.slice(1));
      const [entries, setEntries] = useState([]);
      const [settings, setSettings] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [filter, setFilter] = useState('all');
      const [dateFilter, setDateFilter] = useState(() => {
        try {
          const stored = localStorage.getItem('notebook.dateFilter');
          return VALID_DATE_FILTERS.includes(stored) ? stored : 'all';
        } catch { return 'all'; }
      });
      const [newContent, setNewContent] = useState('');
      const [newPinned, setNewPinned] = useState(false);
      const [urlInput, setUrlInput] = useState('');
      const [tokenInput, setTokenInput] = useState('');

      useEffect(() => {
        if (hash) loadAll();
      }, [hash]);

      useEffect(() => {
        try { localStorage.setItem('notebook.dateFilter', dateFilter); } catch {}
      }, [dateFilter]);

      async function loadAll() {
        setLoading(true);
        setError(null);
        try {
          const [entriesData, settingsData] = await Promise.all([
            api('/entries'),
            api('/settings')
          ]);
          setEntries(entriesData || []);
          setSettings(settingsData);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }

      async function saveEntry() {
        if (!newContent.trim()) return;
        try {
          const newEntry = await api('/entries', {
            method: 'POST',
            body: JSON.stringify({ content: newContent, pinned: newPinned })
          });
          setNewContent('');
          setNewPinned(false);
          setEntries(prev => sortEntries([{ ...newEntry, annotation_count: 0 }, ...prev]));
        } catch (e) {
          setError(e.message);
        }
      }

      async function deleteEntry(id) {
        try {
          await api(`/entries/${id}`, { method: 'DELETE' });
          setEntries(prev => prev.filter(e => e.id !== id));
        } catch (e) {
          setError(e.message);
        }
      }

      async function patchEntry(id, body) {
        try {
          const updated = await api(`/entries/${id}`, {
            method: 'PATCH',
            body: JSON.stringify(body)
          });
          setEntries(prev => sortEntries(prev.map(e => {
            if (e.id !== id) return e;
            return { ...updated, annotation_count: e.annotation_count };
          })));
        } catch (e) {
          setError(e.message);
          throw e;
        }
      }

      async function addAnnotation(id, content) {
        try {
          const newAnnotation = await api(`/entries/${id}/annotations`, {
            method: 'POST',
            body: JSON.stringify({ content })
          });
          setEntries(prev => prev.map(e =>
            e.id === id
              ? { ...e, annotation_count: (e.annotation_count || 0) + 1 }
              : e
          ));
          return newAnnotation;
        } catch (e) {
          setError(e.message);
          throw e;
        }
      }

      async function connect() {
        const base = urlInput.replace(/\/$/, '');
        const fullUrl = base.endsWith('/notebook-api') ? base : `${base}/functions/v1/notebook-api`;
        try {
          const res = await fetch(`${fullUrl}/entries`, {
            headers: { 'X-Notebook-Token': tokenInput }
          });
          if (!res.ok) throw new Error('Check URL and token');
          const hashValue = `${fullUrl}|${tokenInput}`;
          window.location.hash = hashValue;
          setHash(hashValue);
        } catch (e) {
          setError('Connection failed: ' + e.message);
        }
      }

      const filtered = entries.filter(e => {
        let pass = true;
        if (filter === 'pinned') pass = e.pinned;
        else if (filter === 'ai') pass = e.author === 'ai';
        else if (filter === 'user') pass = e.author === 'user';
        if (pass) pass = dateFilterPass(e, dateFilter);
        return pass;
      });

      if (!hash) {
        return (
          <div className="connect-page">
            <h1>NOTEBOOK</h1>
            {error && <div className="error-banner" onClick={() => setError(null)}>{error}</div>}
            <input
              placeholder="Supabase Project URL"
              value={urlInput}
              onChange={e => setUrlInput(e.target.value)}
            />
            <input
              placeholder="API Token"
              value={tokenInput}
              onChange={e => setTokenInput(e.target.value)}
            />
            <button onClick={connect}>连接</button>
          </div>
        );
      }

      return (
        <div className="app">
          <header>
            <div className="header-top">
              <h1>NOTEBOOK</h1>
              <button onClick={loadAll}>↻</button>
            </div>
            <div>{settings?.ai_name || 'AI'} × {settings?.user_name || 'User'}</div>
            <div>STANDBY MEMORY BUFFER</div>
          </header>

          {error && <div className="error-banner" onClick={() => setError(null)}>{error}</div>}

          <div className="filters">
            <button className={filter === 'all' ? 'active' : ''} onClick={() => setFilter('all')}>全部</button>
            <button className={filter === 'pinned' ? 'active' : ''} onClick={() => setFilter('pinned')}>📌</button>
            <button className={filter === 'ai' ? 'active' : ''} onClick={() => setFilter('ai')}>{settings?.ai_name || 'AI'}</button>
            <button className={filter === 'user' ? 'active' : ''} onClick={() => setFilter('user')}>{settings?.user_name || 'User'}</button>
          </div>

          <div className="date-filters">
            <button className={dateFilter === 'all' ? 'active' : ''} onClick={() => setDateFilter('all')}>全部</button>
            <button className={dateFilter === 'today' ? 'active' : ''} onClick={() => setDateFilter('today')}>本日</button>
            <button className={dateFilter === '3d' ? 'active' : ''} onClick={() => setDateFilter('3d')}>近三日</button>
            <button className={dateFilter === '7d' ? 'active' : ''} onClick={() => setDateFilter('7d')}>近七日</button>
            <button className={dateFilter === '30d' ? 'active' : ''} onClick={() => setDateFilter('30d')}>近三十日</button>
          </div>

          <div className="new-entry">
            <textarea
              value={newContent}
              onChange={e => setNewContent(e.target.value)}
              placeholder="写点什么..."
            />
            <div className="new-entry-actions">
              <button onClick={() => setNewPinned(!newPinned)}>{newPinned ? '取消置顶' : '置顶'}</button>
              <button onClick={saveEntry}>保存</button>
            </div>
          </div>

          {loading && <div className="loading">加载中...</div>}

          {!loading && filtered.length === 0 && <div className="empty">暂无条目</div>}

          {!loading && filtered.map(entry => (
            <EntryCard
              key={entry.id}
              entry={entry}
              settings={settings}
              onDelete={deleteEntry}
              onPatch={patchEntry}
              onAnnotate={addAnnotation}
            />
          ))}

          <footer>NON-ARCHIVABLE</footer>
        </div>
      );
    }

    function EntryCard({ entry, settings, onDelete, onPatch, onAnnotate }) {
      const [editing, setEditing] = useState(false);
      const [editContent, setEditContent] = useState(entry.content);

      async function handlePin() {
        await onPatch(entry.id, { pinned: !entry.pinned });
      }

      async function handleDelete() {
        if (!confirm('删除这条条目？')) return;
        await onDelete(entry.id);
      }

      async function handleSaveEdit() {
        try {
          await onPatch(entry.id, { content: editContent });
          setEditing(false);
        } catch (e) {
          // 保持 editing 状态，错误已由父组件显示
        }
      }

      const authorName = entry.author === 'ai'
        ? (settings?.ai_name || 'AI')
        : (settings?.user_name || 'User');

      return (
        <div className="entry-card" style={entry.pinned ? { background: 'rgba(180,160,120,0.1)' } : {}}>
          <div className="entry-header">
            <span className={entry.author === 'ai' ? 'entry-author-ai' : 'entry-author-user'}>[{authorName}]</span>
            {entry.pinned && <span>📌</span>}
            <span className="entry-meta">#{entry.id} {new Date(entry.created_at).toLocaleDateString()}</span>
            {entry.author === 'user' && (
              <span className="entry-actions">
                {!editing && <button onClick={() => { setEditing(true); setEditContent(entry.content); }}>编辑</button>}
                <button onClick={handleDelete}>删除</button>
                <button onClick={handlePin}>{entry.pinned ? '取消置顶' : '置顶'}</button>
              </span>
            )}
          </div>
          {editing ? (
            <div>
              <textarea value={editContent} onChange={e => setEditContent(e.target.value)} />
              <div className="edit-actions">
                <button className="primary" onClick={handleSaveEdit}>保存</button>
                <button onClick={() => setEditing(false)}>取消</button>
              </div>
            </div>
          ) : (
            <div className="entry-content">{entry.content}</div>
          )}
          <NoteSection entry={entry} settings={settings} onAnnotate={onAnnotate} />
        </div>
      );
    }

    function NoteSection({ entry, settings, onAnnotate }) {
      const [expanded, setExpanded] = useState(false);
      const [annotations, setAnnotations] = useState([]);
      const [input, setInput] = useState('');

      async function toggle() {
        const next = !expanded;
        if (next && annotations.length < entry.annotation_count) {
          try {
            const detail = await api(`/entries/${entry.id}`);
            setAnnotations(detail.annotations || []);
          } catch (e) {
            // ignore
          }
        }
        setExpanded(next);
      }

      async function submit() {
        if (!input.trim()) return;
        try {
          const newAnnotation = await onAnnotate(entry.id, input);
          setInput('');
          setExpanded(true);
          setAnnotations(prev => [...prev, newAnnotation]);
        } catch (e) {
          // 错误已由父组件显示
        }
      }

      return (
        <div className="annotation-section">
          {entry.annotation_count > 0 && (
            <button className="annotation-toggle" onClick={toggle}>
              {entry.annotation_count} 条批注
            </button>
          )}
          {expanded && (
            <div className="annotation-list">
              {annotations.map(a => (
                <div key={a.id} className="annotation-bubble">
                  <span className="annotation-author">
                    {a.author === 'ai' ? (settings?.ai_name || 'AI') : (settings?.user_name || 'User')}
                  </span>
                  <span className="annotation-content">{a.content}</span>
                  <span className="annotation-time">{new Date(a.created_at).toLocaleString()}</span>
                </div>
              ))}
              <div className="annotation-input-row">
                <input
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  placeholder="写批注..."
                  onKeyDown={e => e.key === 'Enter' && submit()}
                />
                <button className="primary" onClick={submit}>保存</button>
              </div>
            </div>
          )}
          {entry.annotation_count === 0 && (
            <div className="annotation-input-row">
              <input
                value={input}
                onChange={e => setInput(e.target.value)}
                placeholder="写批注..."
                onKeyDown={e => e.key === 'Enter' && submit()}
              />
              <button className="primary" onClick={submit}>保存</button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
